name: Quality Gates

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  pr-quality:
    runs-on: ubuntu-latest
    env:
      LOCUST_FAILURE_RATIO_THRESHOLD: "0.05"
      LOCUST_P95_THRESHOLD_MS: "1500"
      LOCUST_MIN_REQUESTS: "20"
    steps:
    - name: Get the source code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        virtualenvs-create: true
        virtualenvs-in-project: true

    - name: Install dependencies and dev tools
      run: |
        poetry install --no-interaction --no-root

    - name: Flake8 linting
      run: poetry run flake8 src/ --count --select=E,F,W --show-source --ignore=W504 --statistics

    - name: Bandit security check
      run: poetry run bandit -r src/ -ll

    - name: Run tests with coverage
      run: poetry run pytest tests/ --cov=movienight --cov-fail-under=70 --cov-report=term-missing

    - name: Check cyclomatic complexity
      run: | 
        python3 - <<'PY'
        import re
        import subprocess
        import sys

        threshold = 10
        proc = subprocess.run(
            ["poetry", "run", "radon", "cc", "-s", "src/"],
            capture_output=True,
            text=True,
            check=True,
        )

        max_cc = 0
        worst_line = ""

        for line in proc.stdout.splitlines():
            m = re.search(r"\((\d+)\)$", line.strip())
            if not m:
                continue
            score = int(m.group(1))
            if score > max_cc:
                max_cc = score
                worst_line = line

        print(f"Max complexity: {max_cc}")
        if worst_line:
            print(f"Worst block: {worst_line}")

        if max_cc > threshold:
            sys.exit(f"Cyclomatic complexity too high: {max_cc} > {threshold}")
        PY

    - name: Check maintainability index
      run: |
        python - <<'PY'
        import re
        import subprocess
        import sys

        threshold = 70.0

        proc = subprocess.run(
            ["poetry", "run", "radon", "mi", "-s", "src/"],
            capture_output=True,
            text=True,
            check=True,
        )

        min_mi = 101.0
        worst_line = ""

        for line in proc.stdout.splitlines():
            line = line.strip()
            m = re.search(r"\((\d+(?:\.\d+)?)\)\s*$", line)
            if not m:
                continue
            mi = float(m.group(1))
            if mi < min_mi:
                min_mi = mi
                worst_line = line

        if min_mi == 101.0:
            sys.exit("No maintainability index values were parsed from radon output")

        print(f"Minimum MI: {min_mi:.2f}")
        print(f"Worst line: {worst_line}")

        if min_mi < threshold:
            sys.exit(f"Maintainability index too low: {min_mi:.2f} < {threshold:.2f}")
        PY

    - name: Load test with Locust
      if: always()
      run: |
        poetry run uvicorn --app-dir src movienight.main:app --host 127.0.0.1 --port 8000 &
        SERVER_PID=$!
        trap 'kill $SERVER_PID 2>/dev/null || true' EXIT
        sleep 3

        poetry run locust \
          -f load_tests.py \
          --headless \
          --only-summary \
          --host http://127.0.0.1:8000 \
          -u 10 \
          -r 2 \
          --run-time 1m \
          --csv=locust

    - name: Validate Locust thresholds
      if: always()
      run: |
        python3 - <<'PY'
        import csv
        import os
        import sys
        from pathlib import Path

        stats_path = Path("locust_stats.csv")
        if not stats_path.exists():
            sys.exit("locust_stats.csv was not produced by Locust")

        with stats_path.open(newline="", encoding="utf-8") as csv_file:
            rows = list(csv.DictReader(csv_file))

        aggregated = next(
            (row for row in rows if row.get("Name") == "Aggregated"),
            None,
        )
        if aggregated is None:
            sys.exit("Aggregated Locust stats row was not found")

        def read_float(row: dict[str, str], *names: str) -> float:
            for name in names:
                value = row.get(name)
                if value not in (None, ""):
                    return float(value)
            raise KeyError(f"Missing metric column: {names}")

        request_count = int(read_float(aggregated, "Request Count"))
        failure_count = int(read_float(aggregated, "Failure Count"))
        p95_ms = read_float(aggregated, "95%", "95")

        failure_ratio = (
            failure_count / request_count if request_count else 1.0
        )
        max_failure_ratio = float(
            os.environ["LOCUST_FAILURE_RATIO_THRESHOLD"]
        )
        max_p95_ms = float(os.environ["LOCUST_P95_THRESHOLD_MS"])
        min_requests = int(os.environ["LOCUST_MIN_REQUESTS"])

        print(f"Locust aggregated requests: {request_count}")
        print(f"Locust aggregated failures: {failure_count}")
        print(f"Locust failure ratio: {failure_ratio:.4f}")
        print(f"Locust p95 response time: {p95_ms:.2f} ms")

        failures: list[str] = []
        if request_count < min_requests:
            failures.append(
                f"Request count too low: {request_count} < {min_requests}"
            )
        if failure_ratio > max_failure_ratio:
            failures.append(
                "Failure ratio too high: "
                f"{failure_ratio:.4f} > {max_failure_ratio:.4f}"
            )
        if p95_ms > max_p95_ms:
            failures.append(
                f"P95 response time too high: {p95_ms:.2f} > {max_p95_ms:.2f}"
            )

        if failures:
            for failure in failures:
                print(f"ERROR: {failure}")
            sys.exit(1)
        PY

    - name: Upload Locust reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: locust-report
        path: |
          locust_stats.csv
          locust_failures.csv
          locust_exceptions.csv
          locust_stats_history.csv
        if-no-files-found: warn
