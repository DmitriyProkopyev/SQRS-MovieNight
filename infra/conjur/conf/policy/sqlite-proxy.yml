# Conjur policy: SQLite encryption-key access control.
#
# Loaded into Conjur at branch `root`, this policy creates the namespace
# `sqlite-policy/` and grants exclusively one machine identity
# (host `sqlite-policy/database-proxy`, used by the SQLite proxy service)
# the ability to read and authenticate against the SQLCipher key variable.
#
# Conjur enforces deny-by-default authorization: any role that is not named
# in a `!permit` statement here cannot read or fetch the variable. The
# Conjur `admin` user retains super-user access by design (its API key is
# expected to be kept out-of-band and never distributed to application
# services). No other policy in this repository grants access to
# `sqlite-policy/sqlite/key`, so the proxy host is the only application
# identity authorized to retrieve the key at runtime.
#
# After loading, the proxy's API key is obtained via
# `conjur host rotate-api-key -i sqlite-policy/database-proxy`
# and written to `src/proxy/conjur_token` (mounted into the proxy
# container as a read-only file with restrictive permissions).

- !policy
  id: sqlite-policy
  annotations:
    description: Namespace owning the SQLCipher encryption key for the proxy-managed encrypted SQLite database.
  body:
    - !host
      id: database-proxy
      annotations:
        description: Machine identity used by the SQLite proxy service to authenticate to Conjur and fetch the SQLCipher key per request.

    - !variable
      id: sqlite/key
      annotations:
        description: 32-byte SQLCipher encryption key (hex-encoded) generated by Vault and synchronized into Conjur. Read by the proxy host only.

    - !permit
      role: !host database-proxy
      privileges: [ read, execute ]
      resource: !variable sqlite/key
